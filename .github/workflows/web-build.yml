# Деплой веб-клиента (react-native-web) на GitHub Pages.
# После пуша в main: Settings → Pages → Source: GitHub Actions.
# Сайт: https://<user>.github.io/<repo>/ — в бандле вшиты моки API (PUBLIC_FORCE_API_MOCK).

name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install front dependencies
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Build Web App
        working-directory: front
        env:
          # Подпапка GitHub Pages для репозитория (имя репо = сегмент URL)
          PUBLIC_PATH: /${{ github.event.repository.name }}/
          NODE_ENV: production
          # Вшить моки в артефакт Pages — вход/регистрация без Railway и CORS
          PUBLIC_FORCE_API_MOCK: '1'
        run: yarn web:build

      - name: Jekyll off + SPA
        run: |
          touch front/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: front/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
